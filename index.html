<style>
  /* ... (seus estilos anteriores) ... */
  #installBtn { display: none; align-items: center; } /* Oculto por padrão */
  .sos-btn { z-index: 100; } /* Garantir que fique no topo */
</style>

<!-- ... (Corpo do HTML permanece igual) ... -->

<script>
  const STORAGE_KEY = "libertus_mg_pwa_v2";

  const DEFAULT_DATA = {
    groupLocationUrl: "https://www.google.com/maps/search/?api=1&query=S%C3%A3o+Jos%C3%A9+SC",
    sosWhatsappNumber: "",
    nextDestination: {
      place: "Serra do Rio do Rastro",
      description: "Encontro oficial com concentração, briefing de saída e comboio organizado.",
      date: "27/04/2026",
      city: "Lauro Müller - SC",
      time: "07:30"
    },
    members: [
      { name: "Irmão Atlas", paid: true },
      { name: "Irmão Lobo", paid: true },
      { name: "Irmão Caveira", paid: false }
    ],
    events: [
      { date: "27/04/2026", place: "Serra do Rio do Rastro", note: "Saída principal" }
    ]
  };

  let APP = loadData();
  let deferredPrompt = null;

  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  function loadData() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return structuredClone(DEFAULT_DATA);
      const parsed = JSON.parse(saved);
      // Garante que se a estrutura mudar, o app não quebre
      return { ...structuredClone(DEFAULT_DATA), ...parsed };
    } catch (e) {
      return structuredClone(DEFAULT_DATA);
    }
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(APP));
  }

  function showToast(message) {
    const el = $("#toast");
    el.textContent = message;
    el.classList.add("show");
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => el.classList.remove("show"), 3000);
  }

  function renderAll() {
    renderHome();
    renderMembers();
    renderEvents();
    renderStats();
  }

  function renderHome() {
    $("#nextDestinationName").textContent = APP.nextDestination.place;
    $("#nextDestinationDesc").textContent = APP.nextDestination.description;
    $("#nextDestinationDate").textContent = "📅 " + APP.nextDestination.date;
    $("#nextDestinationCity").textContent = "📍 " + APP.nextDestination.city;
    $("#nextDestinationTime").textContent = "🕗 " + APP.nextDestination.time;
  }

  function renderMembers() {
    const tbody = $("#membersTable");
    tbody.innerHTML = "";
    APP.members.forEach(member => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${member.name}</td>
        <td>${member.paid 
          ? '<span class="status-ok"><i>✓</i>Em dia</span>' 
          : '<span class="status-pending">⚠ Pendente</span>'}
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function renderEvents() {
    const list = $("#eventsList");
    list.innerHTML = "";
    APP.events.forEach((event, index) => {
      const li = document.createElement("li");
      li.className = "event";
      li.innerHTML = `
        <div class="event-date">${event.date}</div>
        <div>
          <div class="event-place">${event.place}</div>
          <div class="event-note">${event.note}</div>
        </div>
        <div class="event-tag">${index === 0 ? "Próximo" : "Agenda"}</div>
      `;
      list.appendChild(li);
    });
  }

  function renderStats() {
    const total = APP.members.length;
    const paid = APP.members.filter(m => m.paid).length;
    $("#statMembers").textContent = total;
    $("#statPaid").textContent = paid;
    $("#statEvents").textContent = APP.events.length;
    $("#summaryTotal").textContent = total;
    $("#summaryPaid").textContent = paid;
    $("#summaryPending").textContent = total - paid;
  }

  function setupNavigation() {
    $$(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => switchSection(btn.dataset.target));
    });
    const hash = location.hash.replace("#", "");
    if (hash && document.getElementById(hash)) switchSection(hash, false);
  }

  function switchSection(targetId, pushHash = true) {
    $$(".section").forEach(s => s.classList.toggle("active", s.id === targetId));
    $$(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.target === targetId));
    if (pushHash) history.replaceState(null, "", "#" + targetId);
  }

  // Lógica de Gestão
  function openAdmin() {
    $("#destName").value = APP.nextDestination.place;
    $("#destDate").value = APP.nextDestination.date;
    $("#destCity").value = APP.nextDestination.city;
    $("#destTime").value = APP.nextDestination.time;
    $("#destDesc").value = APP.nextDestination.description;
    $("#groupLocation").value = APP.groupLocationUrl;
    $("#sosNumber").value = APP.sosWhatsappNumber;
    $("#membersRaw").value = APP.members.map(m => `${m.name}|${m.paid?1:0}`).join("\n");
    $("#eventsRaw").value = APP.events.map(e => `${e.date}|${e.place}|${e.note}`).join("\n");
    $("#adminModal").classList.add("show");
  }

  function saveAdminData() {
    APP.nextDestination = {
      place: $("#destName").value,
      date: $("#destDate").value,
      city: $("#destCity").value,
      time: $("#destTime").value,
      description: $("#destDesc").value
    };
    APP.groupLocationUrl = $("#groupLocation").value;
    APP.sosWhatsappNumber = $("#sosNumber").value;
    
    APP.members = $("#membersRaw").value.split("\n").filter(l => l.includes("|")).map(l => {
      const [n, s] = l.split("|");
      return { name: n.trim(), paid: s.trim() === "1" };
    });

    APP.events = $("#eventsRaw").value.split("\n").filter(l => l.includes("|")).map(l => {
      const [d, p, n] = l.split("|");
      return { date: d.trim(), place: p.trim(), note: n.trim() };
    });

    saveData();
    renderAll();
    $("#adminModal").classList.remove("show");
    showToast("Dados salvos!");
  }

  // PWA Install Logic
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    $("#installBtn").style.display = "inline-flex";
  });

  $("#installBtn").addEventListener("click", async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === "accepted") $("#installBtn").style.display = "none";
      deferredPrompt = null;
    }
  });

  // Inicialização
  document.addEventListener("DOMContentLoaded", () => {
    renderAll();
    setupNavigation();
    $("#adminBtn").addEventListener("click", openAdmin);
    $("#closeAdminBtn").addEventListener("click", () => $("#adminModal").classList.remove("show"));
    $("#saveAdminBtn").addEventListener("click", saveAdminData);
    $("#sosBtn").addEventListener("click", () => {
       const msg = encodeURIComponent("🚨 SOS - Libertu's MG\nPreciso de apoio!");
       window.open(`https://wa.me/${APP.sosWhatsappNumber}?text=${msg}`);
    });
    
    setTimeout(() => $("#splash").classList.add("hide"), 1500);
  });

  // Tecla ESC para fechar modal
  window.addEventListener('keydown', (e) => {
    if (e.key === "Escape") $("#adminModal").classList.remove("show");
  });
</script>
